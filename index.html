# Sentinel-2 MSI for Urban Decisions
## Sensor summary, real applications, and personal reflection

### Focused on the CASA0023 mark scheme

---

# 1) Sensor Summary: What Sentinel-2 MSI Is

.pull-left[
.img-frame[
![Sentinel-2 mission event image](images/sentinel2a_launch.jpg)
]

.tiny-note[
Image: ESA/J. Mai via Wikimedia Commons (CC BY-SA IGO 3.0)
]
]

.pull-right[
&lt;div class="card"&gt;
&lt;span class="accent"&gt;Sentinel-2 MSI&lt;/span&gt; is a passive multispectral optical sensor designed for land and urban surface monitoring.
&lt;/div&gt;

&lt;ul class="tight"&gt;
&lt;li&gt;13 spectral bands (VIS, red-edge, NIR, SWIR)&lt;/li&gt;
&lt;li&gt;Spatial resolution: 10 m / 20 m / 60 m&lt;/li&gt;
&lt;li&gt;Swath width: ~290 km&lt;/li&gt;
&lt;li&gt;Revisit: ~5 days with Sentinel-2A + 2B&lt;/li&gt;
&lt;li&gt;Open and free Copernicus data access&lt;/li&gt;
&lt;/ul&gt;

.small-note[
Core value: frequent, open, and spectrally rich observations for city-scale analysis.
]
]

---

# 2) Independent Summary: Strengths and Constraints

.pull-left[
### Strengths
&lt;div class="card"&gt;
&lt;ul class="tight"&gt;
&lt;li&gt;Strong land-cover separability for built-up, vegetation, and water.&lt;/li&gt;
&lt;li&gt;Red-edge bands improve urban vegetation analysis.&lt;/li&gt;
&lt;li&gt;High revisit frequency supports change monitoring.&lt;/li&gt;
&lt;li&gt;Open archive enables reproducible workflows and low-cost scaling.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
]

.pull-right[
### Constraints
&lt;div class="card-warm"&gt;
&lt;ul class="tight"&gt;
&lt;li&gt;No thermal band: limited for direct land-surface temperature retrieval.&lt;/li&gt;
&lt;li&gt;Optical data quality drops under cloud and haze.&lt;/li&gt;
&lt;li&gt;10 m pixels can mix materials in dense urban blocks.&lt;/li&gt;
&lt;li&gt;Street-level object detection requires much finer resolution.&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
]

.small-note[
Independent judgement: Sentinel-2 is excellent as a &lt;span class="accent"&gt;baseline urban sensor&lt;/span&gt;, and often strongest when fused with thermal or SAR data.
]

---

# 3) Application Scope in Urban Remote Sensing

.pull-left[
### Common urban uses in the literature
&lt;ul class="tight"&gt;
&lt;li&gt;&lt;span class="accent"&gt;Land-cover classification&lt;/span&gt; (built-up, green, water, bare land)&lt;/li&gt;
&lt;li&gt;&lt;span class="accent"&gt;Urban growth tracking&lt;/span&gt; using multi-date scenes&lt;/li&gt;
&lt;li&gt;&lt;span class="accent"&gt;Green infrastructure mapping&lt;/span&gt; with red-edge and NIR features&lt;/li&gt;
&lt;li&gt;&lt;span class="accent"&gt;Interpretable ML&lt;/span&gt; for policy-facing evidence&lt;/li&gt;
&lt;/ul&gt;
]

.pull-right[
### Analytical framing for the case studies
&lt;div class="card"&gt;
&lt;ul class="tight"&gt;
&lt;li&gt;&lt;b&gt;Problem focus:&lt;/b&gt; what urban question each study addresses&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Method strategy:&lt;/b&gt; model and feature choices with Sentinel-2&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Evidence quality:&lt;/b&gt; where the approach is strong and where limits remain&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Practice value:&lt;/b&gt; how findings can support urban planning decisions&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;

]

---

# 4) Study A: Optimized Random Forest Classification

.pull-left[
### Zhang et al. (2021), *Applied Sciences*

&lt;ul class="study"&gt;
&lt;li&gt;&lt;b&gt;Purpose:&lt;/b&gt; improve urban land-cover classification from Sentinel-2 data.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Method:&lt;/b&gt; optimized Random Forest using Sentinel-2 feature sets.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Result relevance:&lt;/b&gt; robust accuracy can be achieved with careful feature and parameter selection.&lt;/li&gt;
&lt;/ul&gt;

&lt;div class="study-note"&gt;
My comment: good evidence for practical mapping, but transferability across different cities still needs local validation.
&lt;/div&gt;
]

.pull-right[
.img-frame[
![Sentinel-2 Chicago scene](images/chicago_s2.jpg)
]

.tiny-note[
Image: Chicago by Sentinel-2, Copernicus attribution via Wikimedia Commons
]
]

---

# 5) Study B: Spectro-Spatio-Temporal Urban Mapping

.pull-left[
### Xu, Heremans &amp; Somers (2022), *Urban Informatics*

&lt;ul class="study"&gt;
&lt;li&gt;&lt;b&gt;Purpose:&lt;/b&gt; test spectral, spatial, and temporal strategies for urban land-cover mapping.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Method:&lt;/b&gt; compare single-date and time-series Sentinel-2 classifier setups.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Result relevance:&lt;/b&gt; combining spring and summer observations improved class discrimination.&lt;/li&gt;
&lt;/ul&gt;

&lt;div class="study-note"&gt;
My comment: acquisition timing is not just technical detail, it directly changes classification quality.
&lt;/div&gt;
]

.pull-right[
.img-frame[
![Sentinel-2 London scene](images/london_s2.jpg)
]

.tiny-note[
Image: London by Sentinel-2, Copernicus attribution via Wikimedia Commons
]
]

---

# 6) Study C: Interpretable Machine Learning for LULC

.pull-left[
### Hosseiny, Abdi &amp; Jamali (2022), *RSASE*

&lt;ul class="study"&gt;
&lt;li&gt;&lt;b&gt;Purpose:&lt;/b&gt; compare shallow and deep models for urban LULC classification.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Method:&lt;/b&gt; 141 features, 85 scenarios, class-level SHAP interpretation.&lt;/li&gt;
&lt;li&gt;&lt;b&gt;Result relevance:&lt;/b&gt; deep models achieved higher mean accuracy and clearer class-level explanations.&lt;/li&gt;
&lt;/ul&gt;

&lt;div class="study-note"&gt;
My comment: interpretability is critical when outputs are used by planners, not only technical analysts.
&lt;/div&gt;
]

.pull-right[
.img-frame[
![Sentinel-2 Manhattan scene](images/manhattan_s2.jpg)
]

.tiny-note[
Image: Manhattan by Sentinel-2, Copernicus attribution via Wikimedia Commons
]
]

---

# 7) Cross-Study Comparison (Why It Matters)

Across the three studies, one pattern is clear: stronger urban classification comes from combining model design, temporal strategy, and interpretability.

&lt;table class="matrix-table"&gt;
  &lt;thead&gt;
    &lt;tr&gt;
      &lt;th&gt;Study&lt;/th&gt;
      &lt;th&gt;What it adds&lt;/th&gt;
      &lt;th&gt;Why it matters for urban analysis&lt;/th&gt;
    &lt;/tr&gt;
  &lt;/thead&gt;
  &lt;tbody&gt;
    &lt;tr&gt;
      &lt;td&gt;Zhang et al. (2021)&lt;/td&gt;
      &lt;td&gt;Optimized RF with Sentinel-2 features&lt;/td&gt;
      &lt;td&gt;Use as a reliable baseline before trying heavier models&lt;/td&gt;
    &lt;/tr&gt;
    &lt;tr&gt;
      &lt;td&gt;Xu et al. (2022)&lt;/td&gt;
      &lt;td&gt;Spectro-spatio-temporal design&lt;/td&gt;
      &lt;td&gt;Prioritize season-aware image selection, not only model tuning&lt;/td&gt;
    &lt;/tr&gt;
    &lt;tr&gt;
      &lt;td&gt;Hosseiny et al. (2022)&lt;/td&gt;
      &lt;td&gt;Interpretable shallow/deep comparison&lt;/td&gt;
      &lt;td&gt;Pair higher accuracy with explainability for planning decisions&lt;/td&gt;
    &lt;/tr&gt;
  &lt;/tbody&gt;
&lt;/table&gt;

&lt;div class="card"&gt;
Synthesis: Sentinel-2 performs best when workflows combine &lt;b&gt;baseline robustness&lt;/b&gt;, &lt;b&gt;time-aware data design&lt;/b&gt;, and &lt;b&gt;interpretable modelling&lt;/b&gt;.
&lt;/div&gt;

---

# 8) Personal Reflection and Future Work

&lt;div class="card"&gt;
I learned that sensor choice is a methodological decision, not a default. Sentinel-2 is powerful because it is open, frequent, and spectrally rich, but I must design around its optical and spatial limits.
&lt;/div&gt;

### What I learned
&lt;ul class="tight"&gt;
&lt;li&gt;Classification quality depends on feature selection, timing, and validation.&lt;/li&gt;
&lt;li&gt;Urban results become more useful when model outputs are interpretable.&lt;/li&gt;
&lt;li&gt;Limitations (cloud, mixed pixels, no thermal) must be explicit in analysis reporting.&lt;/li&gt;
&lt;/ul&gt;

### How I would use this in future work
&lt;ul class="tight"&gt;
&lt;li&gt;Use Sentinel-2 as a baseline layer for city land-cover and vegetation dynamics.&lt;/li&gt;
&lt;li&gt;Fuse with thermal/SAR data for UHI or cloudy-season analysis.&lt;/li&gt;
&lt;li&gt;Build repeatable multi-date workflows for stronger evidence in planning contexts.&lt;/li&gt;
&lt;/ul&gt;
